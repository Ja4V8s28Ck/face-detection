services:
  db:
    image: postgres:18
    environment:
      POSTGRES_USER: faceuser
      POSTGRES_PASSWORD: facepass
      POSTGRES_DB: facedb
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql

  backend:
    build: ./backend
    environment:
      DATABASE_URL: postgresql://faceuser:facepass@db:5432/facedb
      HOST: "0.0.0.0"
      PORT: "8000"
    ports:
      - "8000:8000"
    volumes:
      - uploads:/app/uploads
    depends_on:
      - db

  frontend:
    build: ./frontend
    ports:
      - "3000:80"
    depends_on:
      - backend

volumes:
  pgdata:
  uploads:
